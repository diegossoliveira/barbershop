<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbearia & Clube Gourmet</title>
  <link rel="preconnect" href="https://googleapis.com" />
  <link href="https://googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --preto:    #0d0d0d;
      --carvao:   #1a1a1a;
      --grafite:  #2b2b2b;
      --borda:    #333333;
      --ouro:     #c9a84c;
      --ouro-dim: #a07830;
      --texto:    #f0ece4;
      --muted:    #888880;
      --cobre:    #8a5a34;
      --cobre-dim:#6b4527;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--preto);
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(13,13,13,.92);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--borda);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-brand svg { width: 30px; height: 30px; }
    .nav-brand span { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: .04em; }
    .nav-cta {
      background: var(--ouro);
      color: var(--preto);
      font-weight: 700;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      letter-spacing: .02em;
      transition: opacity .2s, transform .15s;
    }
    .nav-cta:hover { opacity: .88; transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      background: var(--carvao);
      border-bottom: 1px solid var(--borda);
      padding: 56px 24px 48px;
      text-align: center;
    }
    .logo-badge { width: 92px; height: 92px; margin: 0 auto 20px; display: block; }
    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ouro);
      margin-bottom: 12px;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(44px, 9vw, 80px);
      line-height: .95;
      letter-spacing: .02em;
      color: var(--texto);
    }
    .hero h1 span { color: var(--ouro); }
    .hero-sub {
      margin-top: 16px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: .02em;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero-cta {
      display: inline-block;
      margin-top: 28px;
      background: var(--ouro);
      color: var(--preto);
      font-weight: 700;
      font-size: 15px;
      padding: 15px 30px;
      border-radius: 10px;
      letter-spacing: .03em;
      transition: opacity .2s, transform .15s;
    }
    .hero-cta:hover { opacity: .88; transform: translateY(-1px); }

    /* ── CONTAINER ── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .step-label {
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ouro);
      margin-bottom: 10px;
    }
    .section-title { font-size: 26px; font-weight: 700; margin-bottom: 14px; font-family: 'Bebas Neue', sans-serif; letter-spacing: .03em; font-size: 32px; }
    .section-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; max-width: 560px; line-height: 1.6; }

    /* ── CARDS (Alusão ao Bigode) ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--carvao);
      border: 1px solid var(--borda);
      border-radius: 40px 10px 40px 10px; /* Formato inicial de bigode */
      padding: 24px 20px;
      transition: border-color .2s, transform .15s, border-radius .2s;
    }
    .card:hover { 
      border-color: var(--ouro-dim); 
      transform: translateY(-2px) rotate(1deg); 
      border-radius: 10px 40px 10px 40px; /* Inverte a curva no efeito hover */
    }
    .card:nth-child(even) {
      border-radius: 10px 40px 10px 40px;
    }
    .card:nth-child(even):hover {
      border-radius: 40px 10px 40px 10px;
    }
    .card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); border-top: 1px solid var(--borda); padding-top: 10px; }
    .card-price { color: var(--ouro); font-weight: 700; font-size: 14px; }

    .card.gourmet:hover { border-color: var(--cobre); }
    .card.gourmet .card-price { color: var(--cobre); }
    .card.destaque { border-color: var(--ouro-dim); background: #1e1a0f; }

    /* ── DIVISOR ── */
    .divider {
      border: none;
      border-top: 1px solid var(--borda);
      margin: 0;
    }

    /* ── SOBRE (Menu "A Casa Dessa" corrigido) ── */

      position: relative;
      border-radius: 14px;
      padding: 56px 32px;
      overflow: hidden;
      background-color: #0d0d0d;

      background-size: cover;
      background-position: center;
      border: 1px solid var(--borda);
    }
    .sobre h2, .sobre p, .sobre h3, .sobre .step-label {
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
    }

    /* ── FOOTER ── */
    .footer {
      background: var(--carvao);
      border-top: 1px solid var(--borda);
      padding: 32px 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <!-- Ícone simples de tesoura/navalha em SVG -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-scissors" style="color: var(--ouro);"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>
      <span>Clube Gourmet</span>
    </div>
    <a href="#agendar" class="nav-cta">AGENDAR AGORA</a>
  </nav>

  <!-- HERO SECTION -->
  <header class="hero">
    <div class="logo-badge">
      <!-- Ícone de Bigode / Logo Principal -->
